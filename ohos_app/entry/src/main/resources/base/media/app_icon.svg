<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
  <defs>
    <!-- Background: Deep Teal (matches #2c4f54 cPrimary) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#406d73" />
      <stop offset="100%" stop-color="#1d3538" />
    </linearGradient>
    
    <!-- Accent: Green (keeps the "Green Tiger" theme alive but professional) -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect x="0" y="0" width="144" height="144" rx="32" ry="32" fill="url(#bg)" />

  <g transform="translate(24, 28)">
    <!-- Monitor Screen -->
    <rect x="0" y="0" width="96" height="68" rx="8" ry="8" fill="rgba(255,255,255,0.04)" stroke="#ffffff" stroke-width="5" />
    
    <!-- Network Graph inside monitor -->
    <!-- Connecting lines -->
    <path d="M48 34 L48 16 M48 34 L32.4 43 M48 34 L63.6 43" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    
    <!-- Central Node -->
    <circle cx="48" cy="34" r="5.5" fill="url(#accent)" filter="url(#glow)" />
    
    <!-- Peripheral Nodes -->
    <circle cx="48" cy="16" r="3.5" fill="#ffffff" />
    <circle cx="32.4" cy="43" r="3.5" fill="#ffffff" />
    <circle cx="63.6" cy="43" r="3.5" fill="#ffffff" />

    <!-- Monitor Stand -->
    <path d="M48 68 L48 82" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
    <path d="M34 82 L62 82" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
  </g>
</svg>